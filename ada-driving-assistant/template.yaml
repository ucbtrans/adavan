AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ADA Driving Assistant — API Lambda + simulation scheduler

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key (stored in Parameter Store after first deploy)
  DataBucketName:
    Type: String
    Default: ada-driving-assistant
    Description: Existing S3 bucket holding city_streets.json files
  Stage:
    Type: String
    Default: prod
  Env:
    Type: String
    Default: prod
    AllowedValues: [prod, dev]
    Description: Deployment environment (prod keeps existing resource names, dev adds -dev suffix)

Conditions:
  IsProd: !Equals [!Ref Env, prod]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 90
    MemorySize: 512
    Environment:
      Variables:
        S3_BUCKET:         !Ref DataBucketName
        STREETS_KEY:       CA/Berkeley/city_streets.json
        SESSIONS_TABLE:    !Ref SessionsTable
        EVENTS_TABLE:      !Ref EventsTable
        FLEET_TABLE:       !Ref FleetConfigTable
        ANTHROPIC_API_KEY: !Ref AnthropicApiKey

Resources:

  # ── HTTP API Gateway ────────────────────────────────────────────────────────
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # ── API Lambda (Flask + aws-wsgi) ──────────────────────────────────────────
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !If [IsProd, "ada-api", "ada-api-dev"]
      CodeUri: .
      Handler: app.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FleetConfigTable
        - S3ReadPolicy:
            BucketName: !Ref DataBucketName
        - Statement:
            - Effect: Allow
              Action:
                - cloudwatch:GetMetricStatistics
                - cloudwatch:ListMetrics
              Resource: "*"
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: GET

  # ── Simulation Lambda (daily EventBridge cron) ──────────────────────────────
  SimulationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !If [IsProd, "ada-simulation", "ada-simulation-dev"]
      CodeUri: .
      Handler: lambda_function.handler
      Timeout: 300
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucketName
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 * * ? *)
            Name: !If [IsProd, "ada-daily-simulation", "ada-daily-simulation-dev"]
            Description: Generate daily traffic events for all cities

  # ── DynamoDB events table ───────────────────────────────────────────────────
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !If [IsProd, "ada-events", "ada-events-dev"]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: street,   AttributeType: S }
        - { AttributeName: event_id, AttributeType: S }
        - { AttributeName: city,     AttributeType: S }
        - { AttributeName: geohash6, AttributeType: S }
      KeySchema:
        - { AttributeName: street,   KeyType: HASH }
        - { AttributeName: event_id, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: city-index
          KeySchema:
            - { AttributeName: city,     KeyType: HASH }
            - { AttributeName: event_id, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: geohash6-index
          KeySchema:
            - { AttributeName: geohash6, KeyType: HASH }
            - { AttributeName: event_id, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── DynamoDB fleet config table ─────────────────────────────────────────────
  FleetConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !If [IsProd, "ada-fleet-config", "ada-fleet-config-dev"]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: config_key, AttributeType: S }
      KeySchema:
        - { AttributeName: config_key, KeyType: HASH }

  # ── DynamoDB sessions table ─────────────────────────────────────────────────
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !If [IsProd, "ada-sessions", "ada-sessions-dev"]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── Web S3 bucket (static site: index.html + logo) ─────────────────────────
  WebBucketV2:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - IsProd
        - !Sub "ada-driving-assistant-web-v2-${AWS::AccountId}"
        - !Sub "ada-driving-assistant-web-dev-${AWS::AccountId}"
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls:       false
        BlockPublicPolicy:     false
        IgnorePublicAcls:      false
        RestrictPublicBuckets: false

  WebBucketPolicyV2:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucketV2
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub ${WebBucketV2.Arn}/*

  # ── CloudFront distribution (HTTPS for the web bucket) ──────────────────────
  CloudFrontDistributionV2:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: S3WebsiteOriginV2
            DomainName: !Sub ${WebBucketV2}.s3-website-${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3WebsiteOriginV2
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          AllowedMethods:  [GET, HEAD]
          CachedMethods:   [GET, HEAD]

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
    Export:
      Name: !If [IsProd, "ADAApiUrl", "ADAApiUrl-dev"]

  CloudFrontUrlV1:
    Description: Existing v1 CloudFront URL (managed outside this stack)
    Value: https://d1v86oas7j7jis.cloudfront.net
    Condition: IsProd

  WebsiteUrlV2:
    Description: S3 static website URL
    Value: !GetAtt WebBucketV2.WebsiteURL
    Export:
      Name: !If [IsProd, "ADAWebsiteUrlV2", "ADAWebsiteUrlV2-dev"]

  CloudFrontUrlV2:
    Description: HTTPS CloudFront URL
    Value: !Sub https://${CloudFrontDistributionV2.DomainName}
    Export:
      Name: !If [IsProd, "ADACloudFrontUrlV2", "ADACloudFrontUrlV2-dev"]

  WebBucketNameV2:
    Description: Web S3 bucket name
    Value: !Ref WebBucketV2
    Export:
      Name: !If [IsProd, "ADAWebBucketV2", "ADAWebBucketV2-dev"]

  EventsTableArn:
    Description: DynamoDB events table ARN
    Value: !GetAtt EventsTable.Arn
    Export:
      Name: !If [IsProd, "ADAEventsTableArn", "ADAEventsTableArn-dev"]

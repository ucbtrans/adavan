AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ADA Driving Assistant — API Lambda + simulation scheduler

Parameters:
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key (stored in Parameter Store after first deploy)
  DataBucketName:
    Type: String
    Default: ada-driving-assistant
    Description: Existing S3 bucket holding city_streets.json and city_objects.json
  Stage:
    Type: String
    Default: prod

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        S3_BUCKET:        !Ref DataBucketName
        OBJECTS_KEY:      CA/Berkeley/city_objects.json
        STREETS_KEY:      CA/Berkeley/city_streets.json
        SESSIONS_TABLE:   !Ref SessionsTable
        ANTHROPIC_API_KEY: !Ref AnthropicApiKey

Resources:

  # ── HTTP API Gateway ────────────────────────────────────────────────────────
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # ── API Lambda (Flask + Mangum) ─────────────────────────────────────────────
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ada-api
      CodeUri: .
      Handler: app.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - S3ReadPolicy:
            BucketName: !Ref DataBucketName
        - Statement:
            - Effect: Allow
              Action:
                - cloudwatch:GetMetricStatistics
                - cloudwatch:ListMetrics
              Resource: "*"
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: GET

  # ── Simulation Lambda (daily EventBridge cron) ──────────────────────────────
  SimulationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ada-simulation
      CodeUri: .
      Handler: lambda_function.handler
      Timeout: 120
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucketName
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 * * ? *)
            Name: ada-daily-simulation
            Description: Generate daily Berkeley traffic events

  # ── DynamoDB sessions table ─────────────────────────────────────────────────
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ada-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── Web S3 bucket v2 (static site: index.html + logo) ───────────────────────
  # NOTE: v1 bucket (ada-driving-assistant-web-<acct>) and its CloudFront
  # distribution (d1v86oas7j7jis.cloudfront.net) were created by a previous
  # stack and are preserved as-is outside this template.
  WebBucketV2:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ada-driving-assistant-web-v2-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls:       false
        BlockPublicPolicy:     false
        IgnorePublicAcls:      false
        RestrictPublicBuckets: false

  WebBucketPolicyV2:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebBucketV2
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub ${WebBucketV2.Arn}/*

  # ── CloudFront distribution v2 (HTTPS for the v2 web bucket) ────────────────
  CloudFrontDistributionV2:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: S3WebsiteOriginV2
            DomainName: !Sub ${WebBucketV2}.s3-website-${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              HTTPPort: 80
              OriginProtocolPolicy: http-only
        DefaultCacheBehavior:
          TargetOriginId: S3WebsiteOriginV2
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          AllowedMethods:  [GET, HEAD]
          CachedMethods:   [GET, HEAD]

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
    Export:
      Name: ADAApiUrl

  CloudFrontUrlV1:
    Description: Existing v1 CloudFront URL (managed outside this stack)
    Value: https://d1v86oas7j7jis.cloudfront.net

  WebsiteUrlV2:
    Description: S3 static website URL (v2)
    Value: !GetAtt WebBucketV2.WebsiteURL
    Export:
      Name: ADAWebsiteUrlV2

  CloudFrontUrlV2:
    Description: HTTPS CloudFront URL for v2
    Value: !Sub https://${CloudFrontDistributionV2.DomainName}
    Export:
      Name: ADACloudFrontUrlV2

  WebBucketNameV2:
    Description: Web S3 bucket name (v2)
    Value: !Ref WebBucketV2
    Export:
      Name: ADAWebBucketV2
